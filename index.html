<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game phản xạ</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #222;
            color: white;
        }
        #box {
            width: 300px;
            height: 300px;
            background-color: red;
            margin: 50px auto;
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>🎮 Game phản xạ</h1>
<p>Bấm khi ô chuyển sang màu xanh!</p>

<button onclick="startGame()">Start</button>

<div id="box"></div>

<p id="result"></p>

<script>
    let startTime, endTime;
    let waiting = false;

    function startGame() {
        document.getElementById("result").innerText = "Đợi...";
        document.getElementById("box").style.backgroundColor = "red";

        waiting = true;

        let delay = Math.random() * 3000 + 2000;

        setTimeout(() => {
            document.getElementById("box").style.backgroundColor = "green";
            startTime = new Date().getTime();
            waiting = false;
        }, delay);
    }

    document.getElementById("box").onclick = function () {
        if (waiting) {
            document.getElementById("result").innerText = "❌ Bấm quá sớm!";
        } else {
            endTime = new Date().getTime();
            let reaction = endTime - startTime;
            document.getElementById("result").innerText = 
                "⏱️ Thời gian phản xạ: " + reaction + " ms";
        }
    }
</script>

</body>
</html>
