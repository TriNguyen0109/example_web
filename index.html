<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game mèo di chuyển</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
    }
    #cat {
        position: absolute;
        font-size: 40px;
        top: 100px;
        left: 100px;
        transition: transform 0.1s;
    }
</style>
</head>
<body>

<div id="cat">🐱</div>

<script>
    let cat = document.getElementById("cat");

    let x = 100;
    let y = 100;
    let speed = 5;

    let keys = {};

    document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
    });

    document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
    });

    function update() {
        let moving = false;

        if (keys["w"] || keys["ArrowUp"]) {
            y -= speed;
            cat.style.transform = "rotate(-90deg)";
            moving = true;
        }
        if (keys["s"] || keys["ArrowDown"]) {
            y += speed;
            cat.style.transform = "rotate(90deg)";
            moving = true;
        }
        if (keys["a"] || keys["ArrowLeft"]) {
            x -= speed;
            cat.style.transform = "scaleX(-1)";
            moving = true;
        }
        if (keys["d"] || keys["ArrowRight"]) {
            x += speed;
            cat.style.transform = "scaleX(1)";
            moving = true;
        }

        // Giới hạn màn hình
        if (x < 0) x = 0;
        if (y < 0) y = 0;
        if (x > window.innerWidth - 40) x = window.innerWidth - 40;
        if (y > window.innerHeight - 40) y = window.innerHeight - 40;

        cat.style.left = x + "px";
        cat.style.top = y + "px";

        requestAnimationFrame(update);
    }

    update();
</script>

</body>
</html>
